name: Mega-Linter + Reviewdog
on: [pull_request]

jobs:
  lint-and-review:
    name: Lint & Post Reviews
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required for reviewdog to post comments
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Mega-Linter needs full history

      - name: Run Mega-Linter
        uses: oxsecurity/megalinter/flavors/all@v8
        env:
          # Use the .mega-linter.yml config
          VALIDATE_ALL_CODEBASE: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1

      - name: Run reviewdog on Mega-Linter Reports
        env:
          REVIEWDOG_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -conf=.reviewdog.yml -reporter=github-pr-review
