name: Universal MegaLinter

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1.3.0

      - name: Run MegaLinter + Reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Execute MegaLinter container to analyze files
          # FIXED: Added '|| true' so finding errors doesn't crash the bash script instantly
          docker run -v "${{ github.workspace }}:/tmp/lint" \
            -e OUTPUT_FORMAT=rdjson \
            -e OUTPUT_FOLDER=mega-reports \
            oxsecurity/megalinter-python:v8 || true

          # 2. Check if ANY rdjson report files were produced in the directory
          if ls mega-reports/*.rdjson 1> /dev/null 2>&1; then
            echo "✅ MegaLinter reports found! Processing via Reviewdog..."
            
            # 3. Concatenate all generated reports smoothly into the Reviewdog engine
            cat mega-reports/*.rdjson | reviewdog -f=rdjson \
              -name="Universal Linter" \
              -reporter=github-check \
              -filter-mode=file \
              -level=warning
          else
            echo "⚠️ No rdjson reports located in mega-reports/ workspace folder."
          fi
