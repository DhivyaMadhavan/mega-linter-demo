name: Universal MegaLinter

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1.3.0

      - name: Run MegaLinter + Reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run -v "${{ github.workspace }}:/tmp/lint" \
            -e OUTPUT_FORMAT=rdjson \
            -e OUTPUT_FOLDER=/tmp/lint/mega-reports \
            oxsecurity/megalinter-python:v8 || true
      
          if ls mega-reports/*.rdjson 1> /dev/null 2>&1; then
            echo "✅ MegaLinter reports found! Processing via Reviewdog..."
            
            for report in mega-reports/*.rdjson; do
              # Reporter 1: Inline PR review comments
              cat "$report" | reviewdog -f=rdjson \
                -name="Universal Linter (PR Review)" \
                -reporter=github-pr-review \
                -filter-mode=nofilter \
                -level=warning
      
              # Reporter 2: Status check summary
              cat "$report" | reviewdog -f=rdjson \
                -name="Universal Linter (Check Summary)" \
                -reporter=github-check \
                -filter-mode=file \
                -level=warning
            done
          else
            echo "⚠️ No rdjson reports located in mega-reports/ workspace folder."
          fi

